<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pricing Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 16px;
      max-width: 400px;
      margin: 0 auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    label {
      font-size: 13px;
      display: block;
      margin-top: 10px;
      color: #cbd5f5;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      outline: none;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #0f172a;
      border-radius: 12px;
      text-align: center;
      position: sticky;
      top: 0;
    }

    .price {
      font-size: 26px;
      font-weight: bold;
    }

    .multiplier {
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Pricing Calculator</h2>

  <div class="result">
    <div>Selling Price</div>
    <div class="price" id="price">—</div>
    <div class="multiplier" id="multiplier"></div>
  </div>

  <label>Cost (PKR)</label>
  <input type="number" id="cost">

  <label>k Value</label>
  <input type="number" id="k" value="1000">
</div>

<script>
  const costInput = document.getElementById("cost");
  const kInput = document.getElementById("k");
  const priceEl = document.getElementById("price");
  const multiplierEl = document.getElementById("multiplier");

  function calculate() {
    const C = parseFloat(costInput.value);
    const k = parseFloat(kInput.value);

    if (!C || !k) {
      priceEl.innerText = "—";
      multiplierEl.innerText = "";
      return;
    }

    const multiplier = 2 + (1 / (1 + (C / k)));
    const price = C * multiplier;

    priceEl.innerText = "PKR " + price.toFixed(0);
    multiplierEl.innerText = "Multiplier: " + multiplier.toFixed(2) + "×";
  }

  costInput.addEventListener("input", calculate);
  kInput.addEventListener("input", calculate);

  // Register service worker
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
  }
</script>

</body>
</html>
